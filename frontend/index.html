<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCopilot</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- File Explorer Panel -->
        <aside id="file-panel" class="file-panel">
            <div class="panel-header">
                <h1 class="logo">⚡ OpenCopilot</h1>
            </div>
            <div class="panel-toolbar">
                <span class="panel-title">File Explorer</span>
                <div class="toolbar-actions">
                    <label class="tool-btn" title="Upload file">
                        ⬆
                        <input type="file" id="upload-input" style="display:none" multiple />
                    </label>
                    <button id="refresh-btn" class="tool-btn" title="Refresh">↻</button>
                </div>
            </div>
            <div id="file-tree" class="file-tree"></div>
        </aside>

        <!-- Resize handle -->
        <div id="resize-handle" class="resize-handle"></div>

        <!-- Main Panel: Process Logs -->
        <main id="main-panel" class="main-panel">
            <div class="panel-toolbar">
                <span class="panel-title" id="logs-title">Process Logs</span>
                <div class="toolbar-actions">
                    <span id="process-status" class="status-badge idle">Idle</span>
                    <button id="clear-logs-btn" class="tool-btn" title="Clear logs">🗑</button>
                    <button id="scroll-bottom-btn" class="tool-btn" title="Scroll to bottom">⬇</button>
                </div>
            </div>
            <div id="logs-container" class="logs-container"></div>
        </main>
    </div>

    <!-- File preview modal -->
    <div id="file-preview-modal" class="modal hidden">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="file-preview-title">File Preview</h2>
                <div class="modal-header-actions">
                    <button id="file-download-btn" class="small-btn">⬇ Download</button>
                    <button id="file-preview-close" class="icon-btn">✕</button>
                </div>
            </div>
            <div id="file-preview-body" class="modal-body file-preview-body"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
